<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Reality in Education</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
        }
        .frame {
            background: url('file:///C:/Users/ptirt/OneDrive/Pictures/lay.jpg') no-repeat center center;
            background-size: cover;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 259px;
            height: 461px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; 
            align-items: center;
            position: relative;
        }
        .frame img {
            position: absolute;
            top: 10px;
            left: 10px; 
            width: 30px; 
            height: 30px; 
            border-radius: 50%; 
            opacity: 0.7; 
            background-color: black;
            cursor: pointer;
        }
        .frame h1 {
            margin: 50px 0 10px 0; 
            font-size: 1.5em;
            color: white;
        }
        .frame p {
            font-size: 0.9em;
            color: white;
            text-align: left;
            margin: 10px 15px;
            line-height: 1.5;
        }
        .frame button {
            padding: 10px 20px;
            font-size: 1em;
            color: white;
            background-color: #00f6ff;
            border: 1px solid #00f6ff;
            border-radius: 25px;
            cursor: pointer;
            text-align: center;
            font-weight: bold;
            text-decoration: underline;
            margin-top: 20px;
        }
        .frame button:hover {
            background-color: #00d9e0;
            border-color: #00d9e0;
        }
    </style>
</head>
<body>
    <div class="frame">
        
        <img src="file:///C:/Users/ptirt/OneDrive/Pictures/arrow.jpg" alt="Logo">

        
        <h1>What is Virtual Reality?</h1>

        
        <p>
            Virtual reality, or VR, is a simulated three-dimensional (3D) environment that lets users explore and interact with a virtual surrounding in a way that approximates reality, as it's perceived through the users' senses.
        </p>

        
        <button>Learn More</button>
    </div>
</body>
</html>
