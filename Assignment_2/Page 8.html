<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice or Write a Code</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4; 
        }
        .frame {
            background: url('file:///C:/Users/ptirt/OneDrive/Pictures/lay.jpg') no-repeat center center;
            background-size: cover; 
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 259px; 
            height: 461px; 
            display: flex;
            flex-direction: column;
            justify-content: flex-start; 
            align-items: center;
            position: relative; 
        }
        .logo {
            position: absolute;
            top: 10px; 
            left: 10px; 
            width: 30px; 
            height: 30px; 
            cursor: pointer; 
           border-radius: 50%;
        }
        .frame h1 {
            margin: 50px 0 20px 0; 
            font-size: 1.5em;
            color: white; 
        }
        .frame button {
            margin: 8px 0; 
            padding: 10px 20px;
            font-size: 1em;
            color: black; 
            background-color: #f0f0f0;
            border: 1px solid #ccc;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            text-align: center;
            font-weight: bold; 
        }
        .frame button:hover {
            background-color: #ddd;
        }
    </style>
</head>
<body>
    <div class="frame">
       
        <img src="file:///C:/Users/ptirt/OneDrive/Pictures/arrow.jpg" alt="Arrow Logo" class="logo" onclick="window.location.href='https://example.com'">

        
        <h1>Practice or Write a Code</h1>

       
        <button>Python</button>
        <button>C++</button>
        <button>Java</button>
        <button>HTML</button>
        <button>PHP</button>
        <button>C</button>
    </div>
</body>
</html>
